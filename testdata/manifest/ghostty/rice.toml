schema_version = 1
name = "ghostty"
description = "Ghostty terminal configuration"
supported_os = ["linux", "darwin", "windows"]
profile_key = "machine"

[profiles.macbook]
sources = [{path = "common", mode = "file", target = "$HOME/.config/ghostty"}, {path = "macbook", mode = "file", target = "$HOME/.config/ghostty"}]

[profiles.devstick]
sources = [{path = "common", mode = "file", target = "$HOME/.config/ghostty"}, {path = "devstick", mode = "file", target = "$HOME/.config/ghostty"}]
